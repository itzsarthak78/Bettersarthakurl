<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Login – Sarthak URL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Inter',sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:1.5rem;
      background:linear-gradient(145deg,#f8f4ff 0%,#ede6ff 100%);
      position:relative;
      overflow:hidden;
    }
    body::before, body::after {
      content:'';
      position:absolute;
      border-radius:50%;
      background:rgba(168,85,247,0.08);
      animation:float 12s infinite alternate ease-in-out;
      pointer-events:none;
    }
    body::before { width:400px; height:400px; top:-100px; right:-100px; }
    body::after { width:350px; height:350px; bottom:-80px; left:-80px; animation-delay:-4s; }
    @keyframes float {
      0% { transform:translate(0,0) scale(1); }
      100% { transform:translate(40px,30px) scale(1.2); }
    }
    .container {
      max-width:440px;
      width:100%;
      background:rgba(255,255,255,0.7);
      backdrop-filter:blur(24px) saturate(1.4);
      -webkit-backdrop-filter:blur(24px) saturate(1.4);
      border-radius:40px;
      border:1px solid rgba(192,132,252,0.25);
      box-shadow:0 30px 60px rgba(107,70,193,0.12);
      padding:2.4rem 2rem 2rem;
      text-align:center;
      position:relative;
      z-index:1;
      animation:fadeInUp 0.6s cubic-bezier(0.22,1,0.36,1);
      transition:all 0.3s ease;
    }
    .container:hover {
      border-color:rgba(139,92,246,0.4);
      box-shadow:0 40px 80px rgba(126,34,206,0.15);
      transform:translateY(-2px);
    }
    @keyframes fadeInUp {
      from { opacity:0; transform:translateY(30px); }
      to { opacity:1; transform:translateY(0); }
    }
    .logo {
      font-family:'Playfair Display',serif;
      font-size:2rem;
      font-weight:700;
      font-style:italic;
      background:linear-gradient(135deg,#5b21b6,#a855f7);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      margin-bottom:0.5rem;
    }
    .subtitle {
      color:#52525b;
      font-size:0.95rem;
      margin-bottom:2rem;
    }
    form { display:flex; flex-direction:column; gap:1.2rem; }
    .input-group { position:relative; text-align:left; }
    .input-group .input-icon {
      position:absolute;
      left:1.2rem;
      top:50%;
      transform:translateY(-50%);
      color:#a855f7;
      font-size:1.1rem;
      transition:0.2s;
      pointer-events:none;
    }
    .input-group input {
      width:100%;
      padding:0.9rem 1rem 0.9rem 3.2rem;
      border:2px solid #e5e5e5;
      border-radius:30px;
      font-size:1rem;
      font-weight:500;
      color:#18181b;
      background:white;
      transition:0.25s ease;
      font-family:'Inter',sans-serif;
      outline:none;
      box-shadow:0 2px 8px rgba(0,0,0,0.02);
    }
    .input-group input:focus {
      border-color:#a855f7;
      box-shadow:0 0 0 4px rgba(168,85,247,0.10);
      transform:translateY(-1px);
    }
    .input-group input:focus + .input-icon { color:#7c3aed; }
    .btn-primary {
      background:linear-gradient(135deg,#7c3aed,#6d28d9);
      border:none;
      padding:0.9rem;
      border-radius:30px;
      font-weight:600;
      font-size:1rem;
      color:white;
      cursor:pointer;
      transition:0.3s ease;
      box-shadow:0 8px 24px rgba(124,58,237,0.25);
      font-family:'Inter',sans-serif;
      width:100%;
      position:relative;
      overflow:hidden;
    }
    .btn-primary::after {
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,0.15) 100%);
      pointer-events:none;
    }
    .btn-primary:hover {
      transform:translateY(-2px) scale(1.01);
      box-shadow:0 12px 36px rgba(124,58,237,0.35);
    }
    .btn-primary:active { transform:scale(0.97); }
    .btn-google {
      background:white;
      border:2px solid #e5e5e5;
      padding:0.9rem;
      border-radius:30px;
      font-weight:600;
      font-size:1rem;
      color:#18181b;
      cursor:pointer;
      transition:0.3s ease;
      font-family:'Inter',sans-serif;
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:0.6rem;
      background:#fff;
    }
    .btn-google:hover {
      border-color:#a855f7;
      box-shadow:0 4px 12px rgba(168,85,247,0.1);
      transform:translateY(-1px);
    }
    .btn-google img { width:20px; height:20px; }
    .divider {
      display:flex;
      align-items:center;
      gap:1rem;
      color:#a1a1aa;
      font-size:0.85rem;
      margin:0.2rem 0;
    }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:#e5e5e5; }
    .footer-links {
      margin-top:1.2rem;
      font-size:0.85rem;
      color:#52525b;
    }
    .footer-links a {
      color:#7c3aed;
      text-decoration:none;
      font-weight:500;
    }
    .footer-links a:hover { text-decoration:underline; }
    .error-msg {
      background:#fef2f2;
      color:#b91c1c;
      border-radius:20px;
      padding:0.6rem 1rem;
      font-size:0.85rem;
      border-left:4px solid #ef4444;
      display:flex;
      align-items:center;
      gap:0.6rem;
      text-align:left;
    }
    .error-msg i { font-size:1rem; }
    @media (max-width:480px) {
      .container { padding:1.8rem 1.2rem; }
      .logo { font-size:1.7rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Sarthak URL</div>
    <p class="subtitle">Sign in to manage your links</p>

    <!-- Login Form -->
    <form id="loginForm">
      <div class="input-group">
        <i class="fas fa-envelope input-icon"></i>
        <input type="email" id="loginEmail" placeholder="Email" required />
      </div>
      <div class="input-group">
        <i class="fas fa-key input-icon"></i>
        <input type="password" id="loginPassword" placeholder="Password" required />
      </div>
      <div id="loginError" style="display:none;" class="error-msg">
        <i class="fas fa-exclamation-circle"></i> <span id="loginErrorText">Invalid credentials</span>
      </div>
      <button type="submit" class="btn-primary"><i class="fas fa-arrow-right"></i> Sign In</button>
    </form>

    <div class="divider">or</div>

    <!-- Google Login Button -->
    <button id="googleLoginBtn" class="btn-google">
      <i class="fab fa-google" style="font-size:1.2rem; color:#4285F4;"></i> Sign in with Google
    </button>

    <div class="footer-links">
      Don't have an account? <a href="/register">Register</a>
    </div>
  </div>

  <script>
    // Handle login form submission
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const errorDiv = document.getElementById('loginError');
      const errorText = document.getElementById('loginErrorText');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          errorText.textContent = data.error || 'Login failed';
          errorDiv.style.display = 'flex';
          return;
        }
        // Redirect to the page they came from or home
        const params = new URLSearchParams(window.location.search);
        const redirect = params.get('return') || '/';
        window.location.href = redirect;
      } catch (err) {
        errorText.textContent = 'Network error. Please try again.';
        errorDiv.style.display = 'flex';
      }
    });

    // Google login – we'll implement later, for now just show a message
    document.getElementById('googleLoginBtn').addEventListener('click', () => {
      alert('Google login will be available soon!');
    });
  </script>
</body>
</html>
